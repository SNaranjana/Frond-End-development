<!DOCTYPE html>
<html>
<head>
    <title>Hover Effects & Transitions</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }

       
        .card {
            background: white;
            width: 250px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: transform 0.4s, box-shadow 0.4s;
        }

        
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        
        .card img {
            width: 100%;
            border-radius: 10px;
            transition: transform 0.4s;
        }

        
        .card img:hover {
            transform: scale(1.1);
        }

        /* Button Style */
        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            border-radius: 5px;
            text-decoration: none;
            transition: background 0.3s, transform 0.3s;
        }

        
        .btn:hover {
            background: #0056b3;
            transform: translateY(-3px);
        }
    </style>
</head>
<body>

<h1>Hover Effects with Images</h1>

<div class="container">

    <div class="card">
        <img src="https://picsum.photos/250/150?random=1" alt="Image">
        <h3>Nature</h3>
        <p>Beautiful scenery image.</p>
        <a href="#" class="btn">View More</a>
    </div>

    <div class="card">
        <img src="https://picsum.photos/250/150?random=2" alt="Image">
        <h3>City</h3>
        <p>Modern city landscape.</p>
        <a href="#" class="btn">View More</a>
    </div>

    <div class="card">
        <img src="https://picsum.photos/250/150?random=3" alt="Image">
        <h3>Technology</h3>
        <p>Futuristic tech design.</p>
        <a href="#" class="btn">View More</a>
    </div>

</div>

</body>
</html>
